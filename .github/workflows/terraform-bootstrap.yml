name: Terraform Bootstrap

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: infra/bootstrap
  TF_BACKEND_KEY: bootstrap/terraform.tfstate
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_account_alias: ${{ vars.TF_BOOTSTRAP_ACCOUNT_ALIAS }}

concurrency:
  group: terraform-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    environment: bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN_BOOTSTRAP }}" ]; then
            echo "Missing secret AWS_ROLE_ARN_BOOTSTRAP."
            exit 1
          fi
          if [ -z "${{ vars.TF_BACKEND_BUCKET }}" ]; then
            echo "Missing variable TF_BACKEND_BUCKET."
            exit 1
          fi
          if [ -z "${{ vars.TF_BACKEND_LOCK_TABLE }}" ]; then
            echo "Missing variable TF_BACKEND_LOCK_TABLE."
            exit 1
          fi
          if [ -z "${{ vars.TF_BOOTSTRAP_ACCOUNT_ALIAS }}" ]; then
            echo "Missing variable TF_BOOTSTRAP_ACCOUNT_ALIAS."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_BOOTSTRAP }}

      - name: Create backend config
        run: |
          cat > /tmp/backend.hcl <<EOF
          bucket         = "${{ vars.TF_BACKEND_BUCKET }}"
          key            = "${{ env.TF_BACKEND_KEY }}"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "${{ vars.TF_BACKEND_LOCK_TABLE }}"
          EOF

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -reconfigure -backend-config=/tmp/backend.hcl

      - name: Terraform validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

      - name: Terraform plan
        if: ${{ github.event.inputs.action == 'plan' }}
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} plan -no-color

      - name: Terraform apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve
