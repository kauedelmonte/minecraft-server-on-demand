name: Terraform Infra

on:
  pull_request:
    paths:
      - "infra/**"
      - "!infra/bootstrap/**"
      - ".github/workflows/terraform-infra.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "!infra/bootstrap/**"
      - ".github/workflows/terraform-infra.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: infra
  TF_BACKEND_KEY: infra/terraform.tfstate
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

concurrency:
  group: terraform-infra
  cancel-in-progress: false

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN_INFRA }}" ]; then
            echo "Missing secret AWS_ROLE_ARN_INFRA."
            exit 1
          fi
          if [ -z "${{ vars.TF_BACKEND_BUCKET }}" ]; then
            echo "Missing variable TF_BACKEND_BUCKET."
            exit 1
          fi
          if [ -z "${{ vars.TF_BACKEND_LOCK_TABLE }}" ]; then
            echo "Missing variable TF_BACKEND_LOCK_TABLE."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_INFRA }}

      - name: Create backend config
        run: |
          cat > /tmp/backend.hcl <<EOF
          bucket         = "${{ vars.TF_BACKEND_BUCKET }}"
          key            = "${{ env.TF_BACKEND_KEY }}"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "${{ vars.TF_BACKEND_LOCK_TABLE }}"
          EOF

      - name: Terraform fmt
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -reconfigure -backend-config=/tmp/backend.hcl

      - name: Terraform validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

      - name: Terraform plan
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} plan -no-color

  apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN_INFRA }}" ]; then
            echo "Missing secret AWS_ROLE_ARN_INFRA."
            exit 1
          fi
          if [ -z "${{ vars.TF_BACKEND_BUCKET }}" ]; then
            echo "Missing variable TF_BACKEND_BUCKET."
            exit 1
          fi
          if [ -z "${{ vars.TF_BACKEND_LOCK_TABLE }}" ]; then
            echo "Missing variable TF_BACKEND_LOCK_TABLE."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_INFRA }}

      - name: Create backend config
        run: |
          cat > /tmp/backend.hcl <<EOF
          bucket         = "${{ vars.TF_BACKEND_BUCKET }}"
          key            = "${{ env.TF_BACKEND_KEY }}"
          region         = "${{ env.AWS_REGION }}"
          encrypt        = true
          dynamodb_table = "${{ vars.TF_BACKEND_LOCK_TABLE }}"
          EOF

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -reconfigure -backend-config=/tmp/backend.hcl

      - name: Terraform plan
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} plan -no-color -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve tfplan
